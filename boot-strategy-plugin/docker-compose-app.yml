name: boot-strategy-plugin-full
services:
    strategy-plugin-service:
        # Build image with "./gradlew bootBuildImage from boot-strategy-plugin project"
        image: ghcr.io/rajadilipkolli/my-spring-boot-experiments/boot-strategy-plugin:latest
        container_name: strategy-plugin-service
        ports:
            - "8080:8080"
        depends_on: 
            grafana:
                condition: service_healthy
        environment:
            - LOKI_URI=http://loki:3100/loki/api/v1/push
            - MANAGEMENT_OTLP_METRICS_ENDPOINT=http://tempo:4318/v1/metrics
            - MANAGEMENT_OTLP_TRACES_ENDPOINT=http://tempo:4318/v1/traces
            - MANAGEMENT_OTLP_LOGS_ENDPOINT=http://tempo:4318/v1/logs

    tempo-init:
        image: busybox:1.37
        container_name: tempo-init
        command: ["sh", "-c", "chown -R 10001:10001 /tmp/tempo || true"]
        volumes:
            - tempo-data:/tmp/tempo
        restart: 'no'

    tempo:
        image: grafana/tempo
        extra_hosts: ['host.docker.internal:host-gateway']
        container_name: tempo
        command: [ "-config.file=/etc/tempo.yaml" ]
        depends_on:
            tempo-init:
                condition: service_completed_successfully
            loki:
                condition: service_healthy
        volumes:
            - ./platform/tempo/tempo-local.yaml:/etc/tempo.yaml:ro
            - tempo-data:/tmp/tempo
        ports:
            - "3200:3200"     # Tempo
            - "4317:4317"     # OTLP gRPC
            - "4318:4318"     # OTLP HTTP
            - "9411:9411"     # Zipkin
        healthcheck:
            test: ["CMD", "/tempo", "-version"]
            interval: 5s
            retries: 10

    loki:
        image: grafana/loki
        extra_hosts: ['host.docker.internal:host-gateway']
        container_name: loki
        command: [ "-config.file=/etc/loki/local-config.yaml" ]
        ports:
            - "3100:3100"                                   # loki needs to be exposed so it receives logs
        healthcheck:
            test: ["CMD", "/usr/bin/loki", "--version"]
            interval: 5s
            retries: 10

    prometheus:
        image: prom/prometheus
        extra_hosts: ['host.docker.internal:host-gateway']
        container_name: prometheus
        command:
            - --enable-feature=exemplar-storage
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.enable-remote-write-receiver
        volumes:
            - ./platform/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        ports:
            - "9090:9090"
        healthcheck:
            interval: 5s
            retries: 10
            test: wget --no-verbose --tries=1 --spider http://localhost:9090/status || exit 1

    grafana:
        image: grafana/grafana
        extra_hosts: ['host.docker.internal:host-gateway']
        container_name: grafana
        depends_on:
            tempo:
                condition: service_healthy
            prometheus:
                condition: service_healthy
            loki:
                condition: service_started
        volumes:
            - ./platform/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
            - ./platform/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
            - ./platform/grafana/provisioning/grafana.ini:/etc/grafana/grafana.ini
        environment:
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
            - GF_AUTH_DISABLE_LOGIN_FORM=true
        ports:
            - "3000:3000"
        healthcheck:
            interval: 5s
            retries: 10
            test: wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1
 
volumes:
    tempo-data:
        driver: local
